version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: insight
      POSTGRES_PASSWORD: insight
      POSTGRES_DB: adaptix_insight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insight"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ADAPTIX_INSIGHT_ENV: development
      ADAPTIX_INSIGHT_LOG_LEVEL: INFO
      ADAPTIX_INSIGHT_DATABASE_URL: postgresql+asyncpg://insight:insight@postgres:5432/adaptix_insight
      ADAPTIX_INSIGHT_DATABASE_URL_SYNC: postgresql://insight:insight@postgres:5432/adaptix_insight
      ADAPTIX_INSIGHT_CORS_ORIGINS: http://localhost:3000,http://localhost:3002
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/core_app:/app/core_app
    command: uvicorn core_app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
